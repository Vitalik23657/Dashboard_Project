<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Forest Stocks Dashboard</title>
</head>
<body>
    <div class="dashboard-container">
        <div class="header-panel">
            <div class="header-top">
                <h2>Forest Stocks</h2>
                <div class="header-controls">
                    <div class="growth-badge-container">
                        <div id="growth-badge" class="growth-badge neutral">
                            Calculating...
                        </div>
                        <div id="growth-dropdown" class="growth-dropdown"></div>
                    </div>
                    <div>
                        <label for="estadillo-filter" style="font-weight: 600; margin-right: 8px;">Filter by Plot (Estadillo):</label>
                        <select id="estadillo-filter">
                            <option value="ALL">All Plots Combined</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="legend" id="species-legend"></div>
            
            <div class="legend" id="nfi-legend" style="border-top: none; padding-top: 4px;">
                <div class="legend-item">
                    <div class="nfi-legend-box nfi2-pattern"></div> NFI 2
                </div>
                <div class="legend-item">
                    <div class="nfi-legend-box nfi3-pattern"></div> NFI 3
                </div>
                <div class="legend-item">
                    <div class="nfi-legend-box nfi4-pattern"></div> NFI 4
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="card-header">
                    <h3 class="chart-title">Density (N)</h3>
                    <button class="toggle-btn" onclick="toggleView('density', this)">View Table</button>
                </div>
                <div id="view-density-chart" class="view-container active">
                    <div class="chart-container" id="chart-density"></div>
                </div>
                <div id="view-density-table" class="view-container table-scroll"></div>
            </div>

            <div class="chart-card">
                <div class="card-header">
                    <h3 class="chart-title">Basal Area (BA)</h3>
                    <button class="toggle-btn" onclick="toggleView('basal', this)">View Table</button>
                </div>
                <div id="view-basal-chart" class="view-container active">
                    <div class="chart-container" id="chart-basal"></div>
                </div>
                <div id="view-basal-table" class="view-container table-scroll"></div>
            </div>

            <div class="chart-card">
                <div class="card-header">
                    <h3 class="chart-title">Volume (V)</h3>
                    <button class="toggle-btn" onclick="toggleView('volume', this)">View Table</button>
                </div>
                <div id="view-volume-chart" class="view-container active">
                    <div class="chart-container" id="chart-volume"></div>
                </div>
                <div id="view-volume-table" class="view-container table-scroll"></div>
            </div>
        </div>

        <div class="header-panel" style="margin-top: 24px; padding-bottom: 12px;">
            <h2>Forest Damage Analysis</h2>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <div class="card-header">
                    <h3 class="chart-title">NFI 2 Status</h3>
                </div>
                <div id="damage-nfi2" class="damage-status-container"></div>
            </div>

            <div class="chart-card">
                <div class="card-header">
                    <h3 class="chart-title">NFI 3 Agents</h3>
                    <button class="toggle-btn" onclick="toggleView('damage-nfi3', this)">View Table</button>
                </div>
                <div id="view-damage-nfi3-chart" class="view-container active">
                    <div id="damage-nfi3" class="damage-bars-container"></div>
                </div>
                <div id="view-damage-nfi3-table" class="view-container table-scroll"></div>
            </div>

            <div class="chart-card">
                <div class="card-header">
                    <h3 class="chart-title">NFI 4 Agents</h3>
                    <button class="toggle-btn" onclick="toggleView('damage-nfi4', this)">View Table</button>
                </div>
                <div id="view-damage-nfi4-chart" class="view-container active">
                    <div id="damage-nfi4" class="damage-bars-container"></div>
                </div>
                <div id="view-damage-nfi4-table" class="view-container table-scroll"></div>
            </div>
        </div>

        <div class="header-panel" style="margin-top: 24px; padding-bottom: 12px;">
            <div class="header-top">
                <h2>Wood Quality Assessment</h2>
                <div class="legend" id="quality-legend" style="border: none; padding: 0;">
                    </div>
            </div>
        </div>

        <div class="charts-grid" style="margin-bottom: 40px;">
            <div class="chart-card" style="grid-column: 1 / -1;"> <div class="card-header">
                    <h3 class="chart-title">Quality Classes Evolution (% of Total Volume)</h3>
                    <button class="toggle-btn" onclick="toggleView('quality', this)">View Table</button>
                </div>
                <div id="view-quality-chart" class="view-container active">
                    <div class="chart-container" id="chart-quality" style="height: 300px; padding-bottom: 30px;"></div>
                </div>
                <div id="view-quality-table" class="view-container table-scroll"></div>
            </div>
        </div>

    </div>
    <div id="tooltip"></div>
    <script src="script.js?v=5"></script>
</body>
</html>
